services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-velox}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velox} -d ${POSTGRES_DB:-velox}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-velox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-velox}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      ACCESS_TTL: ${ACCESS_TTL:-900}
      REFRESH_TTL_DAYS: ${REFRESH_TTL_DAYS:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NODE_ENV: production
      PORT: 4000
      # Demo sample data is OPT-IN: leave false for a clean production database.
      SEED_ON_START: ${SEED_ON_START:-false}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-}
      # AI (leave DEEPSEEK_API_KEY empty to disable AI features)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      # optional integrations (blank = feature disabled)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-}
      WEB_ORIGIN: ${WEB_ORIGIN:-}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    expose:
      - "4000"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
  uploads:
